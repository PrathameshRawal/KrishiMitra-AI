<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crop Calendar | KrishiMitra AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/crop_calendar.css') }}">

</head>

<body>

<!-- ===========================
Navbar
=========================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">

            🌾 KrishiMitra AI

        </a>

        <a href="/dashboard" class="btn btn-light">

            ← Dashboard

        </a>

    </div>

</nav>

<!-- ===========================
Hero
=========================== -->

<section class="hero">

    <div class="container text-center">

        <h1>

            🌾 AI Crop Calendar

        </h1>

        <p>

            Get a complete farming schedule from sowing to harvest.

        </p>

    </div>

</section>

<!-- ===========================
Input Form
=========================== -->

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Crop

</label>

<select id="crop" class="form-select">

<option value="">Select Crop</option>

<option>Rice</option>
<option>Wheat</option>
<option>Sugarcane</option>
<option>Cotton</option>
<option>Maize</option>
<option>Soybean</option>
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

State

</label>

<select id="state" class="form-select">

<option value="">Select State</option>

<option>Maharashtra</option>
<option>Karnataka</option>
<option>Gujarat</option>
<option>Madhya Pradesh</option>
<option>Punjab</option>
<option>Haryana</option>
<option>Uttar Pradesh</option>
<option>Rajasthan</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Andhra Pradesh</option>

</select>

</div>

</div>

<div class="text-center mt-4">

<button id="calendarBtn" class="btn btn-success btn-lg">

Generate Crop Calendar

</button>

</div>

</div>

</div>

</div>

<!-- ===========================
Loading
=========================== -->

<div class="container mt-4">

<div id="loading" class="text-center d-none">

<div class="spinner-border text-success"></div>

<p class="mt-3">

Generating AI Crop Calendar...

</p>

</div>

</div>

<!-- ===========================
Result
=========================== -->

<div class="container mt-5 mb-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

📅 Crop Calendar

</div>

<div class="card-body">

<div id="result">

Your AI crop calendar will appear here.

</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/crop_calendar.js') }}"></script>

</body>

</html>
