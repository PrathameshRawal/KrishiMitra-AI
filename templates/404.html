<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 | KrishiMitra AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#198754,#20c997);

overflow:hidden;

}

.error-card{

background:white;

padding:60px 50px;

border-radius:25px;

text-align:center;

max-width:650px;

width:90%;

box-shadow:0 20px 50px rgba(0,0,0,.18);

animation:fadeIn .6s ease;

}

.error-icon{

font-size:80px;

color:#198754;

margin-bottom:20px;

}

.error-code{

font-size:90px;

font-weight:700;

color:#198754;

line-height:1;

}

.error-title{

font-size:30px;

font-weight:600;

margin-top:15px;

}

.error-text{

color:#666;

font-size:17px;

margin:20px 0 35px;

}

.btn-home{

padding:15px 35px;

font-size:17px;

font-weight:600;

border-radius:50px;

}

.btn-home i{

margin-right:8px;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>
   

<div class="error-card">

<div class="error-icon">

<i class="fa-solid fa-tractor"></i>

</div>

<div class="error-code">

404

</div>

<h2 class="error-title">

Oops! Page Not Found

</h2>

<p class="error-text">

The page you are looking for doesn't exist or has been moved.

Return to the KrishiMitra AI Dashboard and continue your smart farming journey.

</p>

<a href="/dashboard" class="btn btn-success btn-home">

<i class="fa-solid fa-house"></i>

Go to Dashboard

</a>

</div>

</body>

</html>
