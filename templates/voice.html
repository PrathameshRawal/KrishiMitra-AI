<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Voice Assistant | KrishiMitra AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/voice.css') }}">

</head>

<body>

<!-- ==========================================
Navbar
========================================== -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">

            🌾 KrishiMitra AI

        </a>

        <a href="/dashboard" class="btn btn-light">

            ← Dashboard

        </a>

    </div>

</nav>

<!-- ==========================================
Hero
========================================== -->

<section class="hero">

    <div class="container text-center">

        <h1>

            🎤 AI Voice Assistant

        </h1>

        <p>

            Speak naturally in English, Hindi, or Marathi and receive spoken farming advice.

        </p>

    </div>

</section>

<!-- ==========================================
Voice Assistant
========================================== -->

<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-body">

<div class="text-center">
    <div class="mb-4">

    <label class="form-label fw-bold">

        🌐 Select Language

    </label>

    <select id="language" class="form-select">

        <option value="en-IN">English</option>

        <option value="hi-IN">हिन्दी (Hindi)</option>

        <option value="mr-IN">मराठी (Marathi)</option>

    </select>

</div>

<button id="startBtn" class="btn btn-success btn-lg me-2">

🎤 Start Speaking

</button>

<button id="stopBtn" class="btn btn-danger btn-lg">

⏹ Stop

</button>

</div>

<div class="mt-4">

<label class="form-label fw-bold">

Your Question

</label>

<textarea
id="question"
class="form-control"
rows="4"
placeholder="Your spoken question will appear here..."></textarea>

</div>

<div class="text-center mt-4">

<button id="askBtn" class="btn btn-primary btn-lg">

🤖 Ask AI

</button>

</div>

</div>

</div>

</div>

<!-- ==========================================
Listening Status
========================================== -->

<div class="container mt-4">

<div id="status" class="alert alert-secondary text-center">

Press "Start Speaking" to begin.

</div>

</div>

<!-- ==========================================
AI Response
========================================== -->

<div class="container mt-4 mb-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

🤖 AI Response

</div>

<div class="card-body">

<div id="response">

The AI answer will appear here and will also be spoken aloud.

</div>

</div>

</div>

</div>

<script src="{{ url_for('static', filename='js/voice.js') }}"></script>

</body>

</html>
