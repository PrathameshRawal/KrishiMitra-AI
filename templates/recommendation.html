<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crop Recommendation | KrishiMitra AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/recommendation.css') }}">

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-lg-2 sidebar">

            <h3 class="logo">
                🌱 KrishiMitra AI
            </h3>

            <a href="/dashboard">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="/chatbot">
                <i class="fa-solid fa-robot"></i>
                AI Assistant
            </a>

            <a href="/weather">
                <i class="fa-solid fa-cloud-sun"></i>
                Weather
            </a>

            <a href="/disease">
                <i class="fa-solid fa-leaf"></i>
                Disease Detection
            </a>

            <a href="/recommendation" class="active">
                <i class="fa-solid fa-seedling"></i>
                Crop Recommendation
            </a>

            <a href="/logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>

        </div>

        <!-- Main -->

        <div class="col-lg-10 main-content">

            <div class="page-header">

                <h2>🌾 AI Crop Recommendation</h2>

                <p>
                    Enter your farm details to receive AI-powered crop recommendations.
                </p>

            </div>

            <div class="row mt-4">

                <!-- Form -->

                <div class="col-lg-5">

                    <div class="card form-card">

                        <div class="card-body">

                            <h4 class="mb-4">
                                Farm Information
                            </h4>

                            <form id="recommendForm">

                                <div class="mb-3">

                                    <label class="form-label">
                                        State
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="state"
                                        placeholder="Maharashtra"
                                        required>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        District
                                    </label>

                                    <input
                                        type="text"
                                        class="form-control"
                                        id="district"
                                        placeholder="Kolhapur"
                                        required>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Soil Type
                                    </label>

                                    <select
                                        class="form-select"
                                        id="soil">

                                        <option>Black Soil</option>
                                        <option>Red Soil</option>
                                        <option>Clay Soil</option>
                                        <option>Sandy Soil</option>
                                        <option>Loamy Soil</option>
                                        <option>Alluvial Soil</option>

                                    </select>

                                </div>

                                <div class="mb-3">

                                    <label class="form-label">
                                        Season
                                    </label>

                                    <select
                                        class="form-select"
                                        id="season">

                                        <option>Kharif</option>
                                        <option>Rabi</option>
                                        <option>Zaid</option>

                                    </select>

                                </div>

                                <div class="mb-4">

                                    <label class="form-label">
                                        Farm Size (Acres)
                                    </label>

                                    <input
                                        type="number"
                                        class="form-control"
                                        id="land"
                                        placeholder="2"
                                        min="1"
                                        required>

                                </div>

                                <button
                                    class="btn btn-success w-100"
                                    type="submit">

                                    <i class="fa-solid fa-wand-magic-sparkles"></i>

                                    Get AI Recommendation

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

                <!-- Result -->

                <div class="col-lg-7">

                    <div class="card result-card">

                        <div class="card-body">

                            <h4 class="mb-3">

                                🤖 Recommendation Result

                            </h4>

                            <div id="result">

                                <div class="alert alert-info">

                                    Fill in your farm details and click
                                    <strong>Get AI Recommendation</strong>.

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/recommendation.js') }}"></script>

</body>

</html>
