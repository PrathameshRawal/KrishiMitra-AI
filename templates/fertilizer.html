<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Fertilizer Recommendation | KrishiMitra AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/fertilizer.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-success shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">

            🌾 KrishiMitra AI

        </a>

        <a href="/dashboard" class="btn btn-light">

            ← Dashboard

        </a>

    </div>

</nav>


<section class="hero">

    <div class="container text-center">

        <h1>

            🌱 AI Fertilizer Recommendation

        </h1>

        <p>

            Get the best fertilizer recommendation using AI.

        </p>

    </div>

</section>


<div class="container mt-5">

<div class="card shadow-lg">

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Crop

</label>

<select id="crop" class="form-select">

<option value="">Select Crop</option>

<option>Rice</option>
<option>Wheat</option>
<option>Sugarcane</option>
<option>Cotton</option>
<option>Maize</option>
<option>Soybean</option>
<option>Tomato</option>
<option>Onion</option>
<option>Potato</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Soil Type

</label>

<select id="soil" class="form-select">

<option value="">Select Soil</option>

<option>Black Soil</option>
<option>Red Soil</option>
<option>Clay Soil</option>
<option>Sandy Soil</option>
<option>Loamy Soil</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Growth Stage

</label>

<select id="stage" class="form-select">

<option value="">Select Stage</option>

<option>Seedling</option>

<option>Vegetative</option>

<option>Flowering</option>

<option>Fruiting</option>

<option>Harvesting</option>

</select>

</div>

</div>

<div class="text-center mt-3">

<button id="recommendBtn" class="btn btn-success btn-lg">

Generate Recommendation

</button>

</div>

</div>

</div>

</div>


<div class="container mt-5">

<div id="loading" class="text-center d-none">

<div class="spinner-border text-success"></div>

<p class="mt-3">

Generating recommendation...

</p>

</div>

</div>


<div class="container mt-5 mb-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

🤖 AI Recommendation

</div>

<div class="card-body">

<div id="result">

Recommendation will appear here.

</div>

</div>

</div>

</div>


<script src="{{ url_for('static', filename='js/fertilizer.js') }}"></script>

</body>

</html>
